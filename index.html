<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>塔底生存指南 / Survival at the Base</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow-x: hidden;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }
    #game-canvas {
      display: block;
      width: 100%;
      max-width: 375px;
      aspect-ratio: 3/4;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
    }
    h1 {
      font-size: 1.3rem;
      margin: 12px 0;
      text-align: center;
      color: #e94560;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }
    .status-bar {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 375px;
      margin: 8px 0;
      justify-content: center;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      padding: 4px 10px;
      background: #0f3460;
      border-radius: 4px;
    }
    .action-bar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button, .btn {
      min-width: 44px;
      min-height: 44px;
      padding: 10px 18px;
      font-size: 0.95rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    button:active, .btn:active {
      background: #c73650;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>塔底生存指南</h1>
    <div class="subtitle">Survival at the Base</div>
    <canvas id="game-canvas" width="375" height="500"></canvas>
    <div class="status-bar">
      <div class="status-item" id="status-hp">&#x2764; 100</div>
      <div class="status-item" id="status-hunger">&#x1F35E; 80</div>
      <div class="status-item" id="status-thirst">&#x1F4A7; 80</div>
      <div class="status-item" id="status-day">Day 1</div>
    </div>
    <div class="action-bar" id="action-bar">
      <button id="btn-explore" class="btn">探索</button>
      <button id="btn-rest" class="btn">休息</button>
      <button id="btn-scavenge" class="btn">搜寻</button>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
